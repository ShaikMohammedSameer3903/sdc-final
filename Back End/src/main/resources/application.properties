# Google OAuth2 (fill CLIENT_ID / CLIENT_SECRET or set env vars)
# Use safe non-empty defaults so auto-configuration doesn't fail when env vars are missing
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Frontend URL used to redirect user to setup password flow when signing in with Google first time
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# CORS Configuration - Comma-separated list of allowed origins
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost}

# WebSocket Configuration - Comma-separated list of allowed origins
websocket.allowed.origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost}